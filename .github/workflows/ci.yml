name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      SUST_ENV: "development"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff black pyright

      - name: Lint (ruff)
        run: ruff check . --config pyproject.toml

      - name: Format check (black)
        run: black --check --config pyproject.toml .

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -fsSL -o /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate Kubernetes base and overlays
        run: |
          kubectl kustomize k8s/base > /tmp/k8s-base.yaml
          kubectl kustomize k8s/overlays/staging > /tmp/k8s-staging.yaml
          kubectl kustomize k8s/overlays/production > /tmp/k8s-production.yaml
          kubectl kustomize k8s/policies > /tmp/k8s-policies.yaml

          kubeconform -summary -strict -ignore-missing-schemas /tmp/k8s-base.yaml
          kubeconform -summary -strict -ignore-missing-schemas /tmp/k8s-staging.yaml
          kubeconform -summary -strict -ignore-missing-schemas /tmp/k8s-production.yaml
          kubeconform -summary -strict -ignore-missing-schemas /tmp/k8s-policies.yaml

      - name: Run pipeline smoke test
        run: python -m pipeline.runner

      - name: Validate generated artifacts
        run: |
          test -f data/sustainability_materials_comparison.csv
          test -f data/company_scenarios.csv
          test -f data/sustainability_roi_analysis.csv
          test -f data/sustainability_summary.json
          test -f data/sustainability_calculator_template.csv
          test -f data/sustainable_switch_optimization.csv
          test -f data/monte_carlo_samples.csv
          test -f data/monte_carlo_bounds.json

      - name: Run tests
        run: pytest tests -q

      - name: Type check (pyright)
        run: |
          python -m pyright \
            config.py \
            domain/models.py \
            domain/scenarios.py \
            domain/optimization.py \
            domain/monte_carlo.py \
            ingestion/factory.py \
            ingestion/external_api_adapter.py \
            ingestion/sqlite_adapter.py \
            security.py \
            secrets_adapter.py \
            scripts/healthcheck.py \
            scripts/load_test.py \
            scripts/perf_report.py \
            scripts/metrics_server.py

      - name: Start Streamlit for runtime checks
        run: |
          streamlit run streamlit_app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &

      - name: Wait for app health endpoint
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8501/_stcore/health >/dev/null; then
              echo "Health endpoint is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          tail -n 120 streamlit.log || true
          exit 1

      - name: Enforce health and data readiness check
        run: python scripts/healthcheck.py

      - name: Enforce lightweight load gate
        env:
          SUST_LOAD_REQUESTS: "300"
          SUST_LOAD_CONCURRENCY: "30"
          SUST_LOAD_MAX_FAILURE_RATE_PCT: "0"
          SUST_LOAD_MAX_P95_MS: "1000"
          SUST_LOAD_MAX_P99_MS: "1800"
        run: python scripts/load_test.py

      - name: Publish performance trend summary
        run: python scripts/perf_report.py

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sustainability-roi-artifacts
          path: |
            data/sustainability_roi_analysis.csv
            data/sustainability_summary.json
            data/sustainability_calculator_template.csv
            data/sustainable_switch_optimization.csv
            data/monte_carlo_samples.csv
            data/monte_carlo_bounds.json
            data/load_test_metrics.json
            data/load_test_history.jsonl
            data/load_test_trend.md
            streamlit.log
          if-no-files-found: warn
