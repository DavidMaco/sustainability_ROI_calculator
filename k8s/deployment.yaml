apiVersion: apps/v1
kind: Deployment
metadata:
  name: sustainability-roi
  namespace: sustainability-roi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sustainability-roi
  template:
    metadata:
      labels:
        app: sustainability-roi
    spec:
      containers:
        - name: app
          image: ghcr.io/davidmaco/sustainability-roi-calculator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: sustainability-roi-config
            - secretRef:
                name: sustainability-roi-secret
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: app-data
              mountPath: /app/data
        - name: metrics
          image: ghcr.io/davidmaco/sustainability-roi-calculator:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/metrics_server.py"]
          ports:
            - containerPort: 9108
              name: metrics
          envFrom:
            - configMapRef:
                name: sustainability-roi-config
            - secretRef:
                name: sustainability-roi-secret
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: sustainability-roi-data
