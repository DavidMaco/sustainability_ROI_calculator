apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sustainability-roi
  namespace: sustainability-roi
spec:
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
