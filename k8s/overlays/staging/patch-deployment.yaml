apiVersion: apps/v1
kind: Deployment
metadata:
  name: sustainability-roi
  namespace: sustainability-roi
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
