apiVersion: v1
kind: ConfigMap
metadata:
  name: sustainability-roi-fluent-bit-config
  namespace: sustainability-roi
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info

    [INPUT]
        Name              tail
        Path              /var/log/app/*.log
        Parser            json
        Tag               sroi.app
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [OUTPUT]
        Name   stdout
        Match  sroi.*

    # Replace stdout with your sink in production (examples):
    # Elasticsearch:
    # [OUTPUT]
    #     Name  es
    #     Match sroi.*
    #     Host  elasticsearch.monitoring.svc.cluster.local
    #     Port  9200
    #     Index sustainability-roi
    # Loki:
    # [OUTPUT]
    #     Name loki
    #     Match sroi.*
    #     Host loki.monitoring.svc.cluster.local
    #     Port 3100
    #     Labels app=sustainability-roi,env=$ENV
