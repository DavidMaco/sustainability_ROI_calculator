apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sroi-baseline-admission
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-pod-security-baseline
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods must run non-root, disable privilege escalation, and set RuntimeDefault seccomp."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - securityContext:
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
