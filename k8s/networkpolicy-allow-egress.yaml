apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sustainability-roi-allow-egress
  namespace: sustainability-roi
spec:
  podSelector:
    matchLabels:
      app: sustainability-roi
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
